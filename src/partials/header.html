<header class="header">
  <div class="header__container container">
    <!-- Логотип -->
    <img src="img/logo.svg" alt="Департамент предпринимательства" class="header__logo">

    <!-- Кнопка -->
    <a href="#" class="header__btn btn" data-api-feedback>Написать нам</a>

    <!-- Правая часть -->
    <div class="header__right">
      <a href="tel:" class="header__phone" data-api-phone aria-label="Телефон"></a>
      <a href="mailto:" class="header__email" data-api-email aria-label="Email"></a>

      <!-- Соцсети -->
      <div class="header__social">
        <a href="#" class="header__icon header__icon--tg" aria-label="Telegram">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295l.213-3.053 5.56-5.022c.242-.213-.054-.333-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.458c.538-.196 1.006.128.832.941z" />
          </svg>
        </a>
        <a href="#" class="header__icon header__icon--vk" aria-label="VK">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12.725 0H11.27C5.406 0 0 4.946 0 11.363v1.274C0 19.054 5.406 24 11.27 24h1.46c5.859 0 11.27-4.946 11.27-11.363v-1.274C24 4.946 18.589 0 12.725 0zm5.543 16.875h-1.783c-.68 0-.89-.27-2.15-1.56-.546-.546-.786-.62-1.127-.62-.346 0-.446.1-.446.576v1.214c0 .406-.13.646-1.286.646-1.893 0-4.006-1.15-5.469-3.276C3.79 10.643 3 8.358 3 7.812c0-.246.1-.476.576-.476h1.783c.43 0 .596.23.76.646.836 2.433 2.24 4.563 2.82 4.563.22 0 .316-.1.316-.64V9.736c-.06-1.146-.67-1.24-.67-1.65 0-.2.17-.4.43-.4h2.813c.36 0 .49.19.49.62v3.35c0 .36.16.49.26.49.22 0 .4-.13.8-.533 1.24-1.39 2.12-3.533 2.12-3.533.11-.246.31-.476.74-.476h1.783c.54 0 .66.28.54.646-.22 1.03-2.38 4.07-2.38 4.07-.19.31-.26.44 0 .88.19.31.81.95 1.22 1.45.76.85 1.34 1.56 1.5 2.05.18.49-.1.74-.6.74z" />
          </svg>
        </a>
      </div>

      <!-- Глаз -->
      <button class="header__vision" aria-label="Версия для слабовидящих">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>

      <!-- Бургер -->
      <button class="header__burger" aria-label="Меню"
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
